# ─────────────────────────────────────────────
#  MACHINE 1 - uavm
# ─────────────────────────────────────────────
- name: init machine uavm
  hosts:
    - uavm
  become: true

  tasks:

  # ─── Disable unattended-upgrades ────────────────────────────

    - name: Disable unattended-upgrades during provisioning
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      failed_when: false

    - name: Kill leftover apt/dpkg processes
      ansible.builtin.shell: |
        pkill -9 apt || true
        pkill -9 dpkg || true
      changed_when: false
      failed_when: false

    - name: Wait for apt lock to be released
      ansible.builtin.shell: >
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock \
        /var/cache/apt/archives/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          sleep 3
        done
      changed_when: false
      failed_when: false

  # ─── Base APT packages ──────────────────────────────────────

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - pipx
          - git
          - wget
          - curl
          - unzip
          - zip
          - firefox
          # Forensics tools
          - dc3dd
          # Docker dependencies
          - ca-certificates
          - gnupg
          - lsb-release
          - apt-transport-https
          # ViperMonkey dependencies
          - libxml2-dev
          - libxslt1-dev
          - zlib1g-dev
        state: present
        update_cache: 'yes'

  # ─── Docker ─────────────────────────────────────────────────

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) \
          signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: 'yes'

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: user
        groups: docker
        append: true

  # ─── Plaso ──────────────────────────────────────────────────
  # Installed via pipx for isolated, system-wide CLI access

    - name: Install log2timeline/Plaso via pipx
      ansible.builtin.shell: |
        pipx install plaso
        pipx ensurepath
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin
      args:
        creates: /usr/local/bin/log2timeline
      failed_when: false

  # ─── Timesketch ─────────────────────────────────────────────
  # Fully non-interactive deployment — replaces deploy_timesketch.sh
  # The official script hangs waiting for interactive create-user input.
  # We replicate exactly what the script does, idempotently.

    - name: Create Timesketch data directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/timesketch
        - /opt/timesketch/data
        - /opt/timesketch/data/postgresql
        - /opt/timesketch/data/opensearch
        - /opt/timesketch/data/upload
        - /opt/timesketch/data/logs
        - /opt/timesketch/data/redis

    - name: Set vm.max_map_count for OpenSearch (runtime)
      ansible.posix.sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: true

    - name: Persist vm.max_map_count in sysctl.conf
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        line: 'vm.max_map_count=262144'
        state: present

    - name: Download Timesketch docker-compose.yml
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/docker/release/docker-compose.yml
        dest: /opt/timesketch/docker-compose.yml
        mode: '0644'
        force: false

    - name: Download Timesketch config.env
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/docker/release/config.env
        dest: /opt/timesketch/config.env
        mode: '0644'
        force: false

    - name: Download timesketch.conf
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/data/timesketch.conf
        dest: /opt/timesketch/timesketch.conf
        mode: '0644'
        force: false

    - name: Download sigma_config.yaml
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/data/sigma_config.yaml
        dest: /opt/timesketch/sigma_config.yaml
        mode: '0644'
        force: false

    - name: Download tags.yaml
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/data/tags.yaml
        dest: /opt/timesketch/tags.yaml
        mode: '0644'
        force: false

    - name: Download nginx.conf
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/contrib/nginx.conf
        dest: /opt/timesketch/nginx.conf
        mode: '0644'
        force: false

    - name: Generate random SECRET_KEY for Timesketch
      ansible.builtin.shell: |
        python3 -c "import secrets; print(secrets.token_hex(32))"
      register: ts_secret_key
      changed_when: false

    - name: Generate random POSTGRES_PASSWORD for Timesketch
      ansible.builtin.shell: |
        python3 -c "import secrets; print(secrets.token_urlsafe(16))"
      register: ts_postgres_password
      changed_when: false

    - name: Patch SECRET_KEY into timesketch.conf
      ansible.builtin.replace:
        path: /opt/timesketch/timesketch.conf
        regexp: "^SECRET_KEY = '.*'"
        replace: "SECRET_KEY = '{{ ts_secret_key.stdout }}'"

    - name: Patch POSTGRES_PASSWORD into config.env
      ansible.builtin.replace:
        path: /opt/timesketch/config.env
        regexp: '^POSTGRES_PASSWORD=.*'
        replace: 'POSTGRES_PASSWORD={{ ts_postgres_password.stdout }}'

    - name: Patch POSTGRES_PASSWORD into timesketch.conf connection string
      ansible.builtin.replace:
        path: /opt/timesketch/timesketch.conf
        regexp: "postgresql\\+psycopg2://timesketch:.*@postgresql"
        replace: "postgresql+psycopg2://timesketch:{{ ts_postgres_password.stdout }}@postgresql"

    - name: Start Timesketch stack via Docker Compose
      ansible.builtin.shell: |
        docker compose up -d
      args:
        chdir: /opt/timesketch
      changed_when: true

    - name: Wait for Timesketch web container to be healthy (up to 3 min)
      ansible.builtin.shell: |
        for i in $(seq 1 36); do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' timesketch-web 2>/dev/null || echo "missing")
          if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
            echo "ready"; exit 0
          fi
          sleep 5
        done
        echo "timeout"; exit 1
      register: ts_wait
      changed_when: false
      failed_when: ts_wait.stdout == "timeout"

    - name: Create Timesketch admin user (non-interactive)
      ansible.builtin.shell: |
        docker compose exec -T timesketch-web \
          tsctl create-user admin --password 'Forensics1!'
      args:
        chdir: /opt/timesketch
      register: ts_createuser
      changed_when: "'already exists' not in ts_createuser.stdout"
      failed_when: false

  # ─── Jupyter Notebook ───────────────────────────────────────
  # Deployed via Docker for easy access on port 8888

    - name: Pull Jupyter minimal-notebook Docker image
      ansible.builtin.shell: |
        docker pull quay.io/jupyter/minimal-notebook
      changed_when: false
      failed_when: false

    - name: Create Jupyter notebooks directory
      ansible.builtin.file:
        path: /opt/jupyter/notebooks
        state: directory
        mode: '0777'

    - name: Create Jupyter Docker Compose file
      ansible.builtin.copy:
        dest: /opt/jupyter/docker-compose.yml
        content: |
          version: "3"
          services:
            jupyter:
              image: quay.io/jupyter/minimal-notebook
              container_name: jupyter
              restart: unless-stopped
              ports:
                - "8888:8888"
              volumes:
                - /opt/jupyter/notebooks:/home/jovyan/work
              environment:
                - JUPYTER_ENABLE_LAB=yes
                - JUPYTER_TOKEN=forensics
        mode: '0644'

    - name: Start Jupyter via Docker Compose
      ansible.builtin.shell: |
        docker compose up -d
      args:
        chdir: /opt/jupyter
      changed_when: true

  # ─── ViperMonkey ────────────────────────────────────────────
  # Installed via pipx from GitHub for system-wide vmonkey CLI

    - name: Install ViperMonkey via pipx from GitHub
      ansible.builtin.shell: |
        pipx install git+https://github.com/decalage2/ViperMonkey.git
        pipx ensurepath
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin
      args:
        creates: /usr/local/bin/vmonkey
      failed_when: false

  # ─── Shell PATH for pipx ────────────────────────────────────

    - name: Ensure pipx bin dir is in system-wide PATH
      ansible.builtin.copy:
        dest: /etc/profile.d/pipx_path.sh
        content: |
          export PATH="/usr/local/bin:$PATH"
        mode: '0644'

  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'Password123'
      user_access_sudo: true


# ─────────────────────────────────────────────
#  MACHINE 2 - targetvm
# ─────────────────────────────────────────────
- name: init machine targetvm
  hosts:
    - targetvm
  become: true

  tasks:
    - name: Print Image Ready
      debug:
        msg: "I am Ready!"

  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'btcmp18@admin'
      user_access_sudo: true
