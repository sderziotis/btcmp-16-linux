# ─────────────────────────────────────────────
#  MACHINE 1 - uavm
# ─────────────────────────────────────────────
- name: init machine uavm
  hosts:
    - uavm
  become: true

  tasks:

  # ─── Disable unattended-upgrades ────────────────────────────

    - name: Disable unattended-upgrades during provisioning
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      failed_when: false

    - name: Kill leftover apt/dpkg processes
      ansible.builtin.shell: |
        pkill -9 apt || true
        pkill -9 dpkg || true
      changed_when: false
      failed_when: false

    - name: Wait for apt lock to be released
      ansible.builtin.shell: >
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock \
        /var/cache/apt/archives/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          sleep 3
        done
      changed_when: false
      failed_when: false

  # ─── Base APT packages ──────────────────────────────────────

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - pipx
          - git
          - wget
          - curl
          - unzip
          - zip
          - firefox
          # Forensics tools
          - dc3dd
          # Docker dependencies
          - ca-certificates
          - gnupg
          - lsb-release
          - apt-transport-https
          # ViperMonkey dependencies
          - libxml2-dev
          - libxslt1-dev
          - zlib1g-dev
        state: present
        update_cache: 'yes'

  # ─── Docker ─────────────────────────────────────────────────

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) \
          signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: 'yes'

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: user
        groups: docker
        append: true

  # ─── Jupyter Notebook ───────────────────────────────────────
  # Deployed via Docker for easy access on port 8888

    - name: Pull Jupyter minimal-notebook Docker image
      ansible.builtin.shell: |
        docker pull quay.io/jupyter/minimal-notebook
      changed_when: false
      failed_when: false

    - name: Create Jupyter notebooks directory
      ansible.builtin.file:
        path: /opt/jupyter/notebooks
        state: directory
        mode: '0777'

    - name: Create Jupyter Docker Compose file
      ansible.builtin.copy:
        dest: /opt/jupyter/docker-compose.yml
        content: |
          version: "3"
          services:
            jupyter:
              image: quay.io/jupyter/minimal-notebook
              container_name: jupyter
              restart: unless-stopped
              ports:
                - "8888:8888"
              volumes:
                - /opt/jupyter/notebooks:/home/jovyan/work
              environment:
                - JUPYTER_ENABLE_LAB=yes
                - JUPYTER_TOKEN=forensics
        mode: '0644'

    - name: Start Jupyter via Docker Compose
      ansible.builtin.shell: |
        docker compose up -d
      args:
        chdir: /opt/jupyter
      changed_when: true

  # ─── ViperMonkey ────────────────────────────────────────────
  # Installed via pipx from GitHub for system-wide vmonkey CLI

    - name: Install ViperMonkey via pipx from GitHub
      ansible.builtin.shell: |
        pipx install git+https://github.com/decalage2/ViperMonkey.git
        pipx ensurepath
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin
      args:
        creates: /usr/local/bin/vmonkey
      failed_when: false

  # ─── Shell PATH for pipx ────────────────────────────────────

    - name: Ensure pipx bin dir is in system-wide PATH
      ansible.builtin.copy:
        dest: /etc/profile.d/pipx_path.sh
        content: |
          export PATH="/usr/local/bin:$PATH"
        mode: '0644'

  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'Password123'
      user_access_sudo: true


# ─────────────────────────────────────────────
#  MACHINE 2 - targetvm
# ─────────────────────────────────────────────
- name: init machine targetvm
  hosts:
    - targetvm
  become: true

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted

  tasks:

  # ─── Mount Evidence Drive and Set READ ONLY ──────────

    - name: Download disk image from GitHub
      ansible.builtin.get_url:
        url: https://github.com/sderziotis/btcmp-16-linux/releases/download/v1/target_disk.img
        dest: /tmp/target_disk.img

    - name: Write image to second disk
      ansible.builtin.command: dd if=/tmp/target_disk.img of=/dev/vdb bs=1M

    - name: Create mount point
      ansible.builtin.file:
        path: /mnt/target_disc
        state: directory
        mode: '0755'

    - name: Mount read-only by label
      ansible.posix.mount:
        path: /mnt/target_disc
        src: LABEL="target disc"
        fstype: ext4
        opts: ro,noauto
        state: mounted

 # ─── Download prebuilt docker container──────────
    - name: Download forensic Docker container tar
      ansible.builtin.get_url:
        url: https://github.com/sderziotis/btcmp-16-linux/releases/download/v1/forensic-lab.tar
        dest: /tmp/forensic-lab.tar

    - name: Load forensic Docker image
      ansible.builtin.shell: |
        docker load -i /tmp/forensic-lab.tar

    - name: Create forensic container (stopped)
      ansible.builtin.shell: |
        docker run --name forensic-container forensic-lab:latest echo "ready"

    - name: Remove tar file
      ansible.builtin.file:
        path: /tmp/forensic-lab.tar
        state: absent

  # ─── SSH ────────────────────────────────────────────────────

    - name: Install openssh-server
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: true

    - name: Enable and start SSH service
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: true

    - name: Allow password authentication in sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
        state: present
      notify: Restart SSH

    - name: Disable root SSH login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
      notify: Restart SSH

  # ─── APT packages ──────────────────────────────────────────

    - name: Install forensics and network tools
      ansible.builtin.apt:
        name:
          - dc3dd
          - netcat-openbsd
        state: present
        update_cache: true

    - name: Print Image Ready
      ansible.builtin.debug:
        msg: "targetvm ready."


  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'btcmp16@admin'
      user_access_sudo: true
