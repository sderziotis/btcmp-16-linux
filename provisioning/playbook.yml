# ─────────────────────────────────────────────
#  MACHINE 1 - uavm
# ─────────────────────────────────────────────
- name: init machine uavm
  hosts:
    - uavm
  become: true

  tasks:

  # ─── Disable unattended-upgrades ────────────────────────────

    - name: Disable unattended-upgrades during provisioning
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      failed_when: false

    - name: Kill leftover apt/dpkg processes
      ansible.builtin.shell: |
        pkill -9 apt || true
        pkill -9 dpkg || true
      changed_when: false
      failed_when: false

    - name: Wait for apt lock to be released
      ansible.builtin.shell: >
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock \
        /var/cache/apt/archives/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          sleep 3
        done
      changed_when: false
      failed_when: false

  # ─── Base APT packages ──────────────────────────────────────

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - pipx
          - git
          - wget
          - curl
          - unzip
          - zip
          - firefox
          # Forensics tools
          - dc3dd
          # Docker dependencies
          - ca-certificates
          - gnupg
          - lsb-release
          - apt-transport-https
          # ViperMonkey dependencies
          - libxml2-dev
          - libxslt1-dev
          - zlib1g-dev
        state: present
        update_cache: 'yes'

  # ─── Docker ─────────────────────────────────────────────────

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) \
          signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: 'yes'

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      ansible.builtin.user:
        name: user
        groups: docker
        append: true

  # ─── Plaso ──────────────────────────────────────────────────
  # Installed via pipx for isolated, system-wide CLI access

    - name: Install log2timeline/Plaso via pipx
      ansible.builtin.shell: |
        pipx install plaso
        pipx ensurepath
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin
      args:
        creates: /usr/local/bin/log2timeline
      failed_when: false

  # ─── Timesketch ─────────────────────────────────────────────
  # Replicates deploy_timesketch.sh exactly, non-interactively.
  # Key fixes vs previous attempt:
  #   1. Directory layout mirrors what the script creates:
  #      /opt/timesketch/{docker-compose.yml, config.env, .env -> config.env,
  #        etc/timesketch/{timesketch.conf,tags.yaml,sigma_config.yaml},
  #        etc/nginx.conf, data/{postgresql,opensearch}, logs/, upload/}
  #   2. .env symlink so docker compose auto-loads all variables
  #   3. POSTGRES_PASSWORD and OPENSEARCH_MEM_USE_GB patched into config.env
  #   4. SECRET_KEY patched into timesketch.conf
  #   5. postgres connection string patched in timesketch.conf

    - name: Set vm.max_map_count for OpenSearch (runtime)
      ansible.builtin.shell: |
        sysctl -q -w vm.max_map_count=262144
      changed_when: true

    - name: Persist vm.max_map_count in sysctl.conf
      ansible.builtin.lineinfile:
        path: /etc/sysctl.conf
        line: 'vm.max_map_count=262144'
        state: present

    - name: Create Timesketch directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/timesketch
        - /opt/timesketch/etc
        - /opt/timesketch/etc/timesketch
        - /opt/timesketch/data
        - /opt/timesketch/data/postgresql
        - /opt/timesketch/data/opensearch
        - /opt/timesketch/logs
        - /opt/timesketch/upload

    - name: Download docker-compose.yml
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/docker/release/docker-compose.yml
        dest: /opt/timesketch/docker-compose.yml
        mode: '0644'
        force: false

    - name: Download config.env
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/docker/release/config.env
        dest: /opt/timesketch/config.env
        mode: '0644'
        force: false

    - name: Create .env symlink pointing to config.env (required by docker compose)
      ansible.builtin.file:
        src: /opt/timesketch/config.env
        dest: /opt/timesketch/.env
        state: link
        force: true

    - name: Download timesketch.conf
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/data/timesketch.conf
        dest: /opt/timesketch/etc/timesketch/timesketch.conf
        mode: '0644'
        force: false

    - name: Download tags.yaml
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/data/tags.yaml
        dest: /opt/timesketch/etc/timesketch/tags.yaml
        mode: '0644'
        force: false

    - name: Download sigma_config.yaml
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/data/sigma_config.yaml
        dest: /opt/timesketch/etc/timesketch/sigma_config.yaml
        mode: '0644'
        force: false

    - name: Download nginx.conf
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/contrib/nginx.conf
        dest: /opt/timesketch/etc/nginx.conf
        mode: '0644'
        force: false

    - name: Generate secrets and patch config.env + timesketch.conf
      ansible.builtin.shell: |
        set -e
        POSTGRES_PASSWORD="$(< /dev/urandom tr -dc A-Za-z0-9 | head -c 32)"
        SECRET_KEY="$(< /dev/urandom tr -dc A-Za-z0-9 | head -c 32)"
        OPENSEARCH_MEM_USE_GB=$(awk '/MemTotal/{printf "%.0f", $2/1024/1024/2}' /proc/meminfo)
        # Minimum 1 GB so OpenSearch doesn't refuse to start
        [ "$OPENSEARCH_MEM_USE_GB" -lt 1 ] && OPENSEARCH_MEM_USE_GB=1

        # Patch config.env
        sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|" /opt/timesketch/config.env
        sed -i "s|^OPENSEARCH_MEM_USE_GB=.*|OPENSEARCH_MEM_USE_GB=${OPENSEARCH_MEM_USE_GB}|" /opt/timesketch/config.env

        # Set all path variables in config.env
        sed -i "s|^TIMESKETCH_CONFIG_PATH=.*|TIMESKETCH_CONFIG_PATH=/opt/timesketch/etc/timesketch|" /opt/timesketch/config.env
        sed -i "s|^TIMESKETCH_UPLOAD_PATH=.*|TIMESKETCH_UPLOAD_PATH=/opt/timesketch/upload|" /opt/timesketch/config.env
        sed -i "s|^TIMESKETCH_LOGS_PATH=.*|TIMESKETCH_LOGS_PATH=/opt/timesketch/logs|" /opt/timesketch/config.env
        sed -i "s|^OPENSEARCH_DATA_PATH=.*|OPENSEARCH_DATA_PATH=/opt/timesketch/data/opensearch|" /opt/timesketch/config.env
        sed -i "s|^POSTGRES_DATA_PATH=.*|POSTGRES_DATA_PATH=/opt/timesketch/data/postgresql|" /opt/timesketch/config.env
        sed -i "s|^NGINX_CONFIG_PATH=.*|NGINX_CONFIG_PATH=/opt/timesketch/etc/nginx.conf|" /opt/timesketch/config.env

        # Patch timesketch.conf
        sed -i "s|^SECRET_KEY = .*|SECRET_KEY = '${SECRET_KEY}'|" /opt/timesketch/etc/timesketch/timesketch.conf
        sed -i "s|postgresql://timesketch:<PASSWORD>@localhost|postgresql://timesketch:${POSTGRES_PASSWORD}@postgres|g" /opt/timesketch/etc/timesketch/timesketch.conf
        sed -i "s|postgresql+psycopg2://timesketch:.*@postgres|postgresql+psycopg2://timesketch:${POSTGRES_PASSWORD}@postgres|g" /opt/timesketch/etc/timesketch/timesketch.conf
      args:
        creates: /opt/timesketch/.secrets_patched
      changed_when: true

    - name: Mark secrets as patched (idempotency guard)
      ansible.builtin.file:
        path: /opt/timesketch/.secrets_patched
        state: touch
        mode: '0600'

    - name: Set opensearch data directory permissions (opensearch runs as uid 1000)
      ansible.builtin.file:
        path: /opt/timesketch/data/opensearch
        owner: '1000'
        group: '1000'
        mode: '0755'
        state: directory

    - name: Start Timesketch stack via Docker Compose
      ansible.builtin.shell: |
        docker compose up -d
      args:
        chdir: /opt/timesketch
      changed_when: true

    - name: Wait for Timesketch web container to be healthy (up to 5 min)
      ansible.builtin.shell: |
        for i in $(seq 1 60); do
          STATUS=$(docker inspect --format='{{ "{{" }}.State.Health.Status{{ "}}" }}' timesketch-web 2>/dev/null || echo "missing")
          if [ "$STATUS" = "healthy" ]; then
            echo "ready"; exit 0
          fi
          sleep 5
        done
        echo "timeout"; exit 1
      register: ts_wait
      changed_when: false
      failed_when: ts_wait.stdout == "timeout"

    - name: Create Timesketch admin user (non-interactive)
      ansible.builtin.shell: |
        docker compose exec -T timesketch-web \
          tsctl create-user admin --password 'Forensics1!'
      args:
        chdir: /opt/timesketch
      register: ts_createuser
      changed_when: "'already exists' not in ts_createuser.stdout"
      failed_when: false

  # ─── Jupyter Notebook ───────────────────────────────────────
  # Deployed via Docker for easy access on port 8888

    - name: Pull Jupyter minimal-notebook Docker image
      ansible.builtin.shell: |
        docker pull quay.io/jupyter/minimal-notebook
      changed_when: false
      failed_when: false

    - name: Create Jupyter notebooks directory
      ansible.builtin.file:
        path: /opt/jupyter/notebooks
        state: directory
        mode: '0777'

    - name: Create Jupyter Docker Compose file
      ansible.builtin.copy:
        dest: /opt/jupyter/docker-compose.yml
        content: |
          version: "3"
          services:
            jupyter:
              image: quay.io/jupyter/minimal-notebook
              container_name: jupyter
              restart: unless-stopped
              ports:
                - "8888:8888"
              volumes:
                - /opt/jupyter/notebooks:/home/jovyan/work
              environment:
                - JUPYTER_ENABLE_LAB=yes
                - JUPYTER_TOKEN=forensics
        mode: '0644'

    - name: Start Jupyter via Docker Compose
      ansible.builtin.shell: |
        docker compose up -d
      args:
        chdir: /opt/jupyter
      changed_when: true

  # ─── ViperMonkey ────────────────────────────────────────────
  # Installed via pipx from GitHub for system-wide vmonkey CLI

    - name: Install ViperMonkey via pipx from GitHub
      ansible.builtin.shell: |
        pipx install git+https://github.com/decalage2/ViperMonkey.git
        pipx ensurepath
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin
      args:
        creates: /usr/local/bin/vmonkey
      failed_when: false

  # ─── Shell PATH for pipx ────────────────────────────────────

    - name: Ensure pipx bin dir is in system-wide PATH
      ansible.builtin.copy:
        dest: /etc/profile.d/pipx_path.sh
        content: |
          export PATH="/usr/local/bin:$PATH"
        mode: '0644'

  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'Password123'
      user_access_sudo: true


# ─────────────────────────────────────────────
#  MACHINE 2 - targetvm
# ─────────────────────────────────────────────
- name: init machine targetvm
  hosts:
    - targetvm
  become: true

  tasks:
    - name: Print Image Ready
      debug:
        msg: "I am Ready!"

  # ─── Role ─────────────────────────────────────────────────────
  roles:
    - role: user-access
      user_access_username: user
      user_access_password: 'btcmp18@admin'
      user_access_sudo: true
